    <style>
      .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
      .tonal-transition { transition: background-color 0.3s ease; }
      .glass-nav { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
      @keyframes wa-ping { 0%{transform:scale(1);opacity:.25} 100%{transform:scale(2.2);opacity:0} }
      @keyframes badge-in { from{opacity:0;transform:scale(.85) translateY(8px)} to{opacity:1;transform:scale(1) translateY(0)} }
      .animate-wa-ping { animation: wa-ping 2s ease-out infinite; }
      .animate-badge-in { animation: badge-in 0.5s cubic-bezier(.22,1,.36,1) .9s both; }
